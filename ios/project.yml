# Platr iOS — XcodeGen project spec
# Generate Xcode project with: xcodegen generate
# Install xcodegen: brew install xcodegen

name: Platr

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0

options:
  bundleIdPrefix: app.platr
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"

targets:
  Platr:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Platr
    resources:
      - path: Platr/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: app.platr.ios
      INFOPLIST_FILE: Platr/Info.plist
      DEVELOPMENT_TEAM: ""            # Set your Apple Team ID here
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    entitlements:
      path: Platr/Platr.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)app.platr.ios

  PlatrTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PlatrTests
    dependencies:
      - target: Platr
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: app.platr.tests

schemes:
  Platr:
    build:
      targets:
        Platr: all
    run:
      config: Debug
      environmentVariables:
        API_BASE_URL: "http://localhost:8000/api/v1"
    test:
      config: Debug
      targets:
        - PlatrTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
